<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }

        .container{
            height: 100vh;
            display: flex;
            /* flex-wrap: wrap; */
            justify-content: center;
            align-items: center;
        }
        .left{
            height: 500px;
            width: 300px;
            background-color: blueviolet;
            margin: 10px;
        }
        .right{
            height: 500px;
            width: 300px;
            background-color: rgb(235, 46, 147);
        }
        @media (max-width:700px) {
            .left{
                display: none;
            }
            .right{
                display: block;
                background-color: blue;
                width: 80%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left"></div>
        <div class="right"></div>
    </div>
    
</body>
</html>
