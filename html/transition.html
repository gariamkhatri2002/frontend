<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container{
            height: 650px;
            width: 700px;
            border: 2px solid black;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            height: 250px;
            width: 250px;
            border: 2px solid red;
            position: absolute;
            border-radius: 300px;
            
        }
        .box:nth-child(1){
           left: 0px; 
        }
        .box:nth-child(2){
            right: 0px;
        }
        .box:nth-child(3){
            top: 0px;
        }
        .box:nth-child(4){
            bottom: 0px;
        }
        .box:nth-child(5){
            left: 50px;
            top: 40px;
        }
        .box:nth-child(6){
            left: 50px;
            top: 40px;
        }
        .box:nth-child(5){
            left: 50px;
            top: 40px;
        }
        .box:nth-child(5){
            left: 50px;
            top: 40px;
        }
        
    </style>
</head>
<body>
    <div class="container">
          <div class="box"></div>
          <div class="box"></div>
          <div class="box"></div>
          <div class="box"></div>
          <div class="box"></div>
          <div class="box"></div>
          <div class="box"></div>
          <div class="box"></div>
    </div>
</body>
</html>
